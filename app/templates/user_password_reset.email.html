<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Restablece tu Contraseña</title></head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
  <h1 style="color: #2c5282;">¡Hola {{ user.full_name }}!</h1>
  <p>Recibimos una solicitud para restablecer tu contraseña.</p>
  <p><a href="{{ payload.reset_url }}" style="background: #2c5282; color: white; padding: 12px 24px; text-decoration: none; border-radius: 4px;">Restablecer contraseña</a></p>
  <p style="font-size: 12px; color: #718096;">Este enlace expira en 1 hora. Si no solicitaste esto, ignora este correo.</p>
  <p>¿Necesitas ayuda? <a href="mailto:{{ links.support_email }}">{{ links.support_email }}</a></p>
</body>
</html>
