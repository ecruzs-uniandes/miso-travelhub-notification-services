<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Error en el Pago</title></head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
  <h1 style="color: #c53030;">¡Hola {{ user.full_name }}!</h1>
  <p>Hubo un problema al procesar tu pago.</p>
  {% if payload.reason %}<p><strong>Motivo:</strong> {{ payload.reason }}</p>{% endif %}
  <p>Por favor intenta nuevamente o contacta a soporte.</p>
  <p><a href="{{ links.app_url }}/bookings/{{ payload.booking_id }}" style="background: #c53030; color: white; padding: 12px 24px; text-decoration: none; border-radius: 4px;">Reintentar pago</a></p>
  <p>¿Necesitas ayuda? <a href="mailto:{{ links.support_email }}">{{ links.support_email }}</a></p>
</body>
</html>
