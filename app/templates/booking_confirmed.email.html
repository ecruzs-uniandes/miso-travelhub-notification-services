<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Reserva Confirmada</title></head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
  <h1 style="color: #2c5282;">¡Hola {{ user.full_name }}!</h1>
  <p>Tu reserva en <strong>{{ payload.hotel_name }}</strong> está confirmada.</p>
  <table style="width: 100%; border-collapse: collapse; margin: 20px 0;">
    <tr><td style="padding: 8px; border-bottom: 1px solid #e2e8f0;"><strong>Check-in:</strong></td><td>{{ payload.check_in }}</td></tr>
    <tr><td style="padding: 8px; border-bottom: 1px solid #e2e8f0;"><strong>Check-out:</strong></td><td>{{ payload.check_out }}</td></tr>
    <tr><td style="padding: 8px;"><strong>Total:</strong></td><td>{{ payload.total }} {{ payload.currency }}</td></tr>
  </table>
  <p><a href="{{ links.app_url }}/bookings/{{ payload.booking_id }}" style="background: #2c5282; color: white; padding: 12px 24px; text-decoration: none; border-radius: 4px;">Ver detalles</a></p>
  <hr style="margin: 30px 0;">
  <p style="font-size: 12px; color: #718096;">¿Necesitas ayuda? Escríbenos a <a href="mailto:{{ links.support_email }}">{{ links.support_email }}</a></p>
</body>
</html>
