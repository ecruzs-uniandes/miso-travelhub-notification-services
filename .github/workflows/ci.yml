name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]

env:
  REGION: us-central1
  SERVICE_NAME: notification-services

  # DEV (Cloud Run directo)
  DEV_PROJECT_ID: gen-lang-client-0930444414
  DEV_PROJECT_NUMBER: "154299161799"
  DEV_IMAGE: us-central1-docker.pkg.dev/gen-lang-client-0930444414/travelhub/notification-services
  DEV_WIF_PROVIDER: projects/154299161799/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  DEV_SA: github-deploy-notification@gen-lang-client-0930444414.iam.gserviceaccount.com

  # PROD (Cloud Deploy canary)
  PROD_PROJECT_ID: travelhub-prod-492116
  PROD_IMAGE: us-central1-docker.pkg.dev/travelhub-prod-492116/travelhub/notification-services
  PROD_WIF_PROVIDER: projects/974898737307/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  PROD_SA: github-deploy-notification@travelhub-prod-492116.iam.gserviceaccount.com

jobs:
  tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=70
        env:
          ENV: test
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          KAFKA_CONSUMER_ENABLED: "false"
          INTERNAL_NOTIFY_TOKEN: test-token
          SENDGRID_API_KEY: SG.test
          SENDGRID_SANDBOX: "true"
          FCM_CREDENTIALS_JSON: ""
          FCM_PROJECT_ID: test
          APP_URL: http://localhost:3000
          SUPPORT_EMAIL: soporte@travelhub.app
          JWT_ISSUER: https://auth.travelhub.app
          JWT_AUDIENCE: travelhub-api
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  lint:
    name: Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install lint tools
        run: pip install ruff flake8
      - name: ruff
        run: ruff check app/ tests/ || true
      - name: flake8
        run: flake8 app/ tests/ --max-line-length=120 --extend-ignore=E203 || true

  # ── DEV: deploy directo a Cloud Run ──
  deploy-dev:
    name: Deploy to Dev (Cloud Run)
    runs-on: ubuntu-latest
    needs: [tests, lint]
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/feature/'))
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.DEV_WIF_PROVIDER }}
          service_account: ${{ env.DEV_SA }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Docker auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet
      - name: Build + push
        run: |
          docker build \
            -t ${{ env.DEV_IMAGE }}:${{ github.sha }} \
            -t ${{ env.DEV_IMAGE }}:latest .
          docker push --all-tags ${{ env.DEV_IMAGE }}
      - name: Deploy Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --project=${{ env.DEV_PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --image=${{ env.DEV_IMAGE }}:${{ github.sha }} \
            --port=8004 \
            --allow-unauthenticated \
            --clear-vpc-connector \
            --network=travelhub-vpc \
            --subnet=subnet-services \
            --vpc-egress=private-ranges-only \
            --min-instances=1 \
            --max-instances=3 \
            --no-cpu-throttling \
            --set-env-vars="ENV=dev,KAFKA_CONSUMER_ENABLED=true,KAFKA_BOOTSTRAP_SERVERS=10.10.3.3:9092,JWT_ISSUER=https://auth.travelhub.app,JWT_AUDIENCE=travelhub-api,APP_URL=https://app.travelhub.app,SUPPORT_EMAIL=soporte@travelhub.app,SENDGRID_FROM_EMAIL=noreply@travelhub.app,SENDGRID_FROM_NAME=TravelHub,SENDGRID_SANDBOX=true,FCM_PROJECT_ID=${{ env.DEV_PROJECT_ID }}" \
            --set-secrets="DATABASE_URL=dev-travelhub-notification-db-url:latest,SENDGRID_API_KEY=dev-travelhub-sendgrid-api-key:latest,FCM_CREDENTIALS_JSON=dev-travelhub-fcm-credentials:latest,INTERNAL_NOTIFY_TOKEN=dev-travelhub-internal-notify-token:latest" \
            --service-account="${{ env.DEV_SA }}" \
            --quiet

  # ── PROD: Cloud Deploy canary (10% → 50% → 100%, aprobación manual) ──
  deploy-prod:
    name: Deploy to Prod (Cloud Deploy Canary)
    runs-on: ubuntu-latest
    needs: [tests, lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.PROD_WIF_PROVIDER }}
          service_account: ${{ env.PROD_SA }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Docker auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet
      - name: Build + push
        run: |
          docker build \
            -t ${{ env.PROD_IMAGE }}:${{ github.sha }} \
            -t ${{ env.PROD_IMAGE }}:latest .
          docker push --all-tags ${{ env.PROD_IMAGE }}
      - name: Create Cloud Deploy release
        run: |
          SHORT_SHA="${GITHUB_SHA::8}"
          TIMESTAMP="$(date +%Y%m%d%H%M%S)"
          gcloud deploy releases create "prod-${SHORT_SHA}-${TIMESTAMP}" \
            --project="${{ env.PROD_PROJECT_ID }}" \
            --region="${{ env.REGION }}" \
            --delivery-pipeline="notification-services-pipeline" \
            --images="notification-services=${{ env.PROD_IMAGE }}:${{ github.sha }}" \
            --skaffold-file=skaffold.yaml

  # ── PR check: solo build, sin deploy ──
  docker-build:
    name: Docker Build (PR check)
    runs-on: ubuntu-latest
    needs: [tests, lint]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: docker build -t ${{ env.SERVICE_NAME }}:${{ github.sha }} .
