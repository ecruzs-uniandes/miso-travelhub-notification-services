name: CI

on:
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint ruff
        run: ruff check app/ tests/

      - name: Lint flake8
        run: flake8 app/ tests/ --max-line-length=120 --extend-ignore=E203

      - name: Run tests
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=70
        env:
          ENV: test
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          KAFKA_CONSUMER_ENABLED: "false"
          INTERNAL_NOTIFY_TOKEN: test-token
          SENDGRID_API_KEY: SG.test
          SENDGRID_SANDBOX: "true"
          FCM_CREDENTIALS_JSON: ""
          FCM_PROJECT_ID: test
          APP_URL: http://localhost:3000
          SUPPORT_EMAIL: soporte@travelhub.app
          JWT_ISSUER: https://auth.travelhub.app
          JWT_AUDIENCE: travelhub-api

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
