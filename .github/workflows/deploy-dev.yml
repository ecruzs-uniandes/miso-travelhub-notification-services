name: Deploy DEV

on:
  push:
    branches:
      - develop
      - "feature/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/154299161799/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deploy-notification@gen-lang-client-0930444414.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy
        run: bash deploy/deploy-dev.sh
        env:
          GCP_PROJECT_ID: gen-lang-client-0930444414
